<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | Dr. Hope A.</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .admin-layout {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
        }

        .message-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .message-card {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #f0f0f0;
            transition: 0.3s;
        }

        .message-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .msg-meta {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .msg-name {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.2rem;
        }

        .msg-email {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 1rem;
        }

        .msg-subject {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .msg-body {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #444;
        }

        .loading-state {
            text-align: center;
            padding: 4rem;
            color: #888;
        }
    </style>
</head>

<body class="bg-light">
    <div class="admin-layout">
        <header class="admin-header">
            <div>
                <h1 class="logo-text">Dashboard Messages</h1>
                <p>Gérez vos contacts et demandes</p>
            </div>
            <a href="#" id="logout-btn" class="logout-btn">Déconnexion</a>
        </header>

        <div id="messages-container" class="message-grid">
            <div class="loading-state">Initialisation des messages...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>

</html>
