<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | Dr. Hope A.</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .admin-layout {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        .logout-btn {
            background: #ff4757;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
        }

        .message-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .message-card {
            background: white;
            padding: 1.5rem;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #f0f0f0;
            transition: 0.3s;
        }

        .message-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .msg-meta {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .msg-name {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.2rem;
        }

        .msg-email {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 1rem;
        }

        .msg-subject {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .msg-body {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #444;
        }

        .loading-state {
            text-align: center;
            padding: 4rem;
            color: #888;
        }
    </style>
</head>

<body class="bg-light">
    <div class="admin-layout">
        <header class="admin-header">
            <div>
                <h1 class="logo-text">Dashboard Admin</h1>
                <p>Gérez vos messages et votre contenu</p>
            </div>
            <div>
                <nav style="display: inline-flex; gap: 1rem; margin-right: 2rem;">
                    <a href="#" class="tab-btn active" data-tab="messages">Messages</a>
                    <a href="#" class="tab-btn" data-tab="editor">Éditeur</a>
                </nav>
                <a href="#" id="logout-btn" class="logout-btn">Déconnexion</a>
            </div>
        </header>

        <!-- Messages Section -->
        <div id="messages-section" class="tab-content">
            <div id="messages-container" class="message-grid">
                <div class="loading-state">Initialisation des messages...</div>
            </div>
        </div>

        <!-- Editor Section -->
        <div id="editor-section" class="tab-content" style="display: none;">
            <div class="editor-grid">
                <div class="admin-card">
                    <h3>Contenu Général</h3>
                    <form id="general-editor" class="editor-form">
                        <div id="general-inputs">Loading...</div>
                        <button type="submit" class="save-btn">Enregistrer</button>
                    </form>
                </div>

                <div class="admin-card">
                    <h3>Expertise</h3>
                    <div id="expertise-list" class="list-editor"></div>
                    <button class="add-btn" onclick="addItem('expertise')">+ Ajouter une expertise</button>
                </div>

                <div class="admin-card">
                    <h3>Expériences</h3>
                    <div id="experiences-list" class="list-editor"></div>
                    <button class="add-btn" onclick="addItem('experiences')">+ Ajouter une expérience</button>
                </div>

                <div class="admin-card">
                    <h3>Formations</h3>
                    <div id="formations-list" class="list-editor"></div>
                    <button class="add-btn" onclick="addItem('formations')">+ Ajouter une formation</button>
                </div>

                <div class="admin-card">
                    <h3>Compétences</h3>
                    <div id="skills-list" class="list-editor"></div>
                    <button class="add-btn" onclick="addItem('skills')">+ Ajouter une compétence</button>
                </div>
            </div>
        </div>
    </div>

    <style>
        .tab-btn {
            padding: 0.5rem 1rem;
            text-decoration: none;
            color: #666;
            font-weight: 500;
            border-bottom: 2px solid transparent;
        }

        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }

        .editor-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        .admin-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
        }

        .editor-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .admin-input {
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .save-btn,
        .add-btn {
            background: var(--primary-color);
            color: white;
            padding: 0.8rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .item-editor {
            border: 1px solid #eee;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            position: relative;
        }

        .delete-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            color: #ff4757;
            cursor: pointer;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>

</html>
