<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | Dr. Hope A.</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .login-title {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            color: var(--primary-color);
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .login-input {
            padding: 1rem;
            border: 1px solid #eee;
            border-radius: 10px;
            font-family: inherit;
        }

        .login-btn {
            background: var(--primary-color);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">Accès Administration</h1>
            <form id="login-form" class="login-form">
                <input type="email" id="email" class="login-input" placeholder="Email" required>
                <input type="password" id="password" class="login-input" placeholder="Mot de passe" required>
                <button type="submit" class="login-btn">Se Connecter</button>
            </form>
            <p id="error-msg" style="color: #ff4757; margin-top: 1rem; font-size: 0.9rem; display: none;"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://eqqdjqdbbwmshllqesdt.supabase.co';
        const supabaseKey = 'sb_publishable_WWWI-B3hA2eo3lBLGlizyg_4w0Me1Fw';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } else {
                window.location.href = 'admin.html';
            }
        });

        // Redirect if already logged in
        supabaseClient.auth.getSession().then(({ data }) => {
            if (data.session) window.location.href = 'admin.html';
        });
    </script>
</body>

</html>
