<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | Dr. Hope A.</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-main);
            position: relative;
            overflow: hidden;
        }

        /* Re-use background shapes logic if possible, or just a nice gradient */
        .login-container::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(5, 150, 105, 0.1);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            filter: blur(80px);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            text-align: center;
            z-index: 1;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .login-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--secondary);
            font-family: var(--font-heading);
            font-weight: 800;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .login-input {
            padding: 1.1rem;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            font-family: var(--font-body);
            font-size: 1rem;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
        }

        .login-btn {
            background: var(--gradient-primary);
            color: white;
            padding: 1.1rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(5, 150, 105, 0.2);
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(5, 150, 105, 0.3);
            opacity: 1;
        }

        .login-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">Accès Administration</h1>
            <form id="login-form" class="login-form">
                <input type="email" id="email" class="login-input" placeholder="Email" required>
                <input type="password" id="password" class="login-input" placeholder="Mot de passe" required>
                <button type="submit" class="login-btn">Se Connecter</button>
            </form>
            <p id="error-msg" style="color: #ff4757; margin-top: 1rem; font-size: 0.9rem; display: none;"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://eqqdjqdbbwmshllqesdt.supabase.co';
        const supabaseKey = 'sb_publishable_WWWI-B3hA2eo3lBLGlizyg_4w0Me1Fw';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } else {
                window.location.href = 'admin.html';
            }
        });

        // Redirect if already logged in
        supabaseClient.auth.getSession().then(({ data }) => {
            if (data.session) window.location.href = 'admin.html';
        });
    </script>
</body>

</html>
