<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | Dr. Hope A.</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-main);
            position: relative;
            overflow: hidden;
        }

        /* Re-use background shapes logic if possible, or just a nice gradient */
        .login-container::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(5, 150, 105, 0.1);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            filter: blur(80px);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            text-align: center;
            z-index: 1;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .login-title {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: var(--secondary);
            font-family: var(--font-heading);
            font-weight: 800;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .login-input {
            padding: 1.1rem;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            font-family: var(--font-body);
            font-size: 1rem;
            background: #f8fafc;
            transition: all 0.3s ease;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
        }

        .login-btn {
            background: var(--gradient-primary);
            color: white;
            padding: 1.1rem;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(5, 150, 105, 0.2);
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(5, 150, 105, 0.3);
            opacity: 1;
        }

        .login-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-title">Accès Administration</h1>
            <form id="login-form" class="login-form">
                <input type="email" id="email" class="login-input" placeholder="Email" required>
                <input type="password" id="password" class="login-input" placeholder="Mot de passe" required>
                <button type="submit" class="login-btn">Se Connecter</button>
            </form>
            <p id="error-msg" style="color: #ff4757; margin-top: 1rem; font-size: 0.9rem; display: none;"></p>
            <p style="margin-top: 1.5rem; font-size: 0.85rem; color: #64748b;">
                <a href="#" id="toggle-signup" style="color: var(--primary); text-decoration: none; font-weight: 600;">Créer un compte administrateur</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://eqqdjqdbbwmshllqesdt.supabase.co';
        const supabaseKey = 'sb_publishable_WWWI-B3hA2eo3lBLGlizyg_4w0Me1Fw';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = loginForm.querySelector('.login-btn');
        const toggleBtn = document.getElementById('toggle-signup');
        const title = document.querySelector('.login-title');

        let isSignUp = false;

        toggleBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isSignUp = !isSignUp;
            if (isSignUp) {
                title.textContent = "Créer un Compte";
                submitBtn.textContent = "S'inscrire";
                toggleBtn.textContent = "Déjà un compte ? Se connecter";
            } else {
                title.textContent = "Accès Administration";
                submitBtn.textContent = "Se Connecter";
                toggleBtn.textContent = "Créer un compte administrateur";
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.textContent = 'Chargement...';
            submitBtn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                let result;
                if (isSignUp) {
                    result = await supabaseClient.auth.signUp({ email, password });
                } else {
                    result = await supabaseClient.auth.signInWithPassword({ email, password });
                }

                const { data, error } = result;

                if (error) {
                    errorMsg.textContent = error.message;
                    errorMsg.style.color = "#ff4757";
                    errorMsg.style.display = 'block';
                } else {
                    if (isSignUp) {
                        errorMsg.textContent = "Compte créé ! Vérifiez vos emails ou connectez-vous.";
                        errorMsg.style.color = "#059669";
                        errorMsg.style.display = 'block';
                        // Reset to login mode
                        isSignUp = false;
                        title.textContent = "Accès Administration";
                        submitBtn.textContent = "Se Connecter";
                        toggleBtn.textContent = "Créer un compte administrateur";
                    } else {
                        window.location.href = 'admin.html';
                    }
                }
            } catch (err) {
                errorMsg.textContent = "Erreur de connexion au serveur.";
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                if (!isSignUp && submitBtn.textContent === 'Chargement...') {
                    submitBtn.textContent = 'Se Connecter';
                }
            }
        });

        // Redirect if already logged in
        supabaseClient.auth.getSession().then(({ data }) => {
            if (data.session) window.location.href = 'admin.html';
        });
    </script>
</body>

</html>
